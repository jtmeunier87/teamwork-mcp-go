name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.13.1)'
        required: true
        default: 'v1.13.1'

env:
  GO_VERSION: "1.26.x"

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-image:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'

    steps:
      - name: Resolve ref
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
            version="${GITHUB_REF#refs/tags/}"
            echo "version=$version" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ steps.resolve.outputs.ref }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: "ghcr.io"
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: docker context create builders

      - uses: docker/setup-buildx-action@v3
        with:
          version: latest
          endpoint: builders

      - name: Image Release (stdio — self-hosted entrypoint)
        run: make push-stdio VERSION=${{ steps.resolve.outputs.version }}

      - name: Image Release (http — multi-tenant entrypoint)
        run: make push VERSION=${{ steps.resolve.outputs.version }}

  build-binaries:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'

    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Resolve ref
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
            version="${GITHUB_REF#refs/tags/}"
            echo "version=$version" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ steps.resolve.outputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go Build
        run: |
          mkdir -p releases
          version="${{ steps.resolve.outputs.version }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -ldflags="-X 'github.com/teamwork/mcp/internal/config.Version=$version'" \
            -o releases/tw-mcp-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/mcp-stdio

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: releases/tw-mcp-${{ matrix.goos }}-${{ matrix.goarch }}

  release-binaries:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    needs: ["build-binaries"]

    steps:
      - name: Resolve ref and version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
            version="${GITHUB_REF#refs/tags/}"
            echo "version=$version" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-tags: true
          fetch-depth: 0
          ref: ${{ steps.resolve.outputs.ref }}

      - name: Download all binaries artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mcp-binaries-*
          path: releases
          merge-multiple: true

      - name: Package release archives and checksums
        run: |
          set -euo pipefail

          version="${{ steps.resolve.outputs.version }}"
          version_no_v="${version#v}"
          dist_dir="releases/dist"

          mkdir -p "$dist_dir"

          for bin in releases/tw-mcp-*; do
            name="$(basename "$bin")"
            target="${name#tw-mcp-}"
            goos="${target%-*}"
            goarch="${target##*-}"

            if [ "$goos" = "windows" ]; then
              cp "$bin" "$dist_dir/tw-mcp.exe"
              (cd "$dist_dir" && zip -q "tw-mcp_${version_no_v}_${goos}_${goarch}.zip" tw-mcp.exe)
              rm -f "$dist_dir/tw-mcp.exe"
            else
              cp "$bin" "$dist_dir/tw-mcp"
              (cd "$dist_dir" && tar -czf "tw-mcp_${version_no_v}_${goos}_${goarch}.tar.gz" tw-mcp)
              rm -f "$dist_dir/tw-mcp"
            fi
          done

          (cd "$dist_dir" && sha256sum tw-mcp_* > checksums.txt)

      - name: Previous Tag
        id: previous-tag
        run: |
          current_tag="${{ steps.resolve.outputs.version }}"
          tag=$(git tag --sort=-version:refname | grep -A1 "^${current_tag}$" | tail -n1 || echo "")
          if [ "$tag" = "$current_tag" ]; then
            tag=""
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Create Release
        run: |
          version="${{ steps.resolve.outputs.version }}"
          gh release create $version \
            --generate-notes \
            ${{ steps.previous-tag.outputs.tag != '' && format('--notes-start-tag {0}', steps.previous-tag.outputs.tag) || '' }} \
            releases/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # publish-homebrew is intentionally disabled for this fork
  # This repo is not a Homebrew tap
